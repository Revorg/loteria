<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎲 Lotería Quántica</title>

  <style>
    :root { --primary: #00ff41; --bg: #0b0e11; --card: #1a1d21; }
    body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; text-align: center; margin: 0; padding: 10px; }

    .header { background: linear-gradient(90deg, #ff41b4, #ff8c00); padding: 15px; border-radius: 12px; margin-bottom: 15px; font-weight: bold; }

    .info-box {
      background: #1a1d21;
      padding: 15px;
      border-radius: 12px;
      margin: 15px auto;
      max-width: 420px;
      text-align: center;
      border: 1px solid var(--primary);
    }

    .info-box h3 { color: var(--primary); margin-bottom: 10px; font-size: 22px; }
    .info-box p { margin: 6px 0; font-size: 16px; }

    .stats { display: flex; justify-content: space-around; background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 15px; }
    .stat-value { font-size: 22px; font-weight: bold; color: var(--primary); display: block; }

    .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; max-width: 400px; margin: 0 auto; padding-bottom: 20px; }
    .numero { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: 8px; font-weight: bold; font-size: 18px; transition: 0.2s; border: 1px solid rgba(255,255,255,0.1); }
    .libre { background: var(--primary); color: black; cursor: pointer; }
    .apartado { background: #f1c40f; color: black; opacity: 0.6; }
    .pagado { background: #e74c3c; color: white; }

    .tabs { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #2c2f33; padding: 5px; border-radius: 50px; display: flex; width: 90%; max-width: 350px; }
    .tab { flex: 1; padding: 12px; border-radius: 40px; border: none; background: none; color: white; font-weight: bold; cursor: pointer; }
    .tab.active { background: var(--primary); color: black; }

    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; }
    .modal-content { background: var(--card); width: 85%; max-width: 350px; padding: 25px; border-radius: 20px; border: 1px solid var(--primary); }

    input { width: 100%; padding: 12px; margin: 10px 0; background: #2c2f33; border: 1px solid #444; color: white; border-radius: 10px; }
    button.action { width: 100%; padding: 15px; border: none; border-radius: 10px; font-weight: bold; font-size: 16px; background: var(--primary); color: black; margin-top: 10px; }

    /* Animación ganador */
    .animacion-ganador { animation: brillo 1s infinite alternate; }
    @keyframes brillo { from { box-shadow: 0 0 10px gold; } to { box-shadow: 0 0 30px orange; } }
  </style>
</head>

<body>

  <div class="header">🌹 LA BIANCA23 - LOTERÍA 🌹</div>

  <!-- INFORMACIÓN CENTRADA Y LLAMATIVA -->
  <div class="info-box">
    <h3>🌟 SORTEO QUÁNTICO 🌟</h3>
    <p>💰 Inyecta $5 (Bs 2500) y gana $300</p>
    <p style="font-size:18px; font-weight:bold; color:#ffdf5e;">
      🎲 JUEGA CON TRIPLE A CARACAS  
      <br>⏰ DOMINGO A LAS 7 PM
    </p>
  </div>

  <div class="stats">
    <div><span class="stat-value" id="l-c">0</span>Libres</div>
    <div><span class="stat-value" id="a-c">0</span>Apart.</div>
    <div><span class="stat-value" id="p-c">0</span>Pagados</div>
  </div>

  <!-- TAB 1: RESERVAR -->
  <div id="t1_cont">
    <div id="grid" class="grid">🔄 Cargando...</div>
  </div>

  <!-- DATOS BANCARIOS AL FINAL -->
  <div class="info-box" style="margin-top:20px;">
    <h3>🏦 DATOS BANCARIOS</h3>
    <p>Banco de Venezuela</p>
    <p>CI: 13.311.257</p>
    <p>Pago Móvil: 04241868334</p>
  </div>

  <!-- MODAL RESERVA -->
  <div id="m-res" class="modal">
    <div class="modal-content">
      <h3>📌 RESERVAR N° <span id="num-span" style="color:var(--primary)"></span></h3>
      <input type="text" id="nom" placeholder="Tu nombre">
      <input type="tel" id="tel" placeholder="WhatsApp">
      <button class="action" id="btn-env" onclick="hacerReserva()">CONFIRMAR RESERVA</button>
      <button onclick="cerrarM()" style="background:none; color:gray; border:none; margin-top:15px; width:100%;">CANCELAR</button>
    </div>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <button id="b1" class="tab active" onclick="verTab(1)">📝 RESERVAR</button>
    <button id="b2" class="tab" onclick="verTab(2)">💵 PAGAR</button>
  </div>
