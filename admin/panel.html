<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>🛠️ Panel Admin – Lotería Quántica</title>

<style>
    body {
        background: #000;
        color: #dff;
        font-family: "Segoe UI", sans-serif;
        margin: 0;
        padding: 0;
        text-align: center;
    }

    /* Pantalla de acceso */
    #loginScreen {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .login-box {
        border: 2px solid #0ff;
        padding: 30px;
        width: 280px;
        border-radius: 10px;
        box-shadow: 0 0 15px #0ff;
    }

    input {
        width: 90%;
        padding: 10px;
        margin-top: 10px;
        border: 1px solid #0ff;
        background: #000;
        color: #0ff;
        border-radius: 5px;
        outline: none;
        box-shadow: 0 0 8px #0ff;
    }

    button {
        margin-top: 15px;
        padding: 10px 20px;
        background: transparent;
        border: 2px solid #0ff;
        color: #0ff;
        cursor: pointer;
        border-radius: 5px;
        transition: 0.2s;
        box-shadow: 0 0 10px #0ff;
    }

    button:hover {
        background: #0ff;
        color: #000;
        box-shadow: 0 0 20px #0ff;
    }

    /* Panel */
    #panel {
        display: none;
        padding: 20px;
    }

    h1 {
        text-shadow: 0 0 10px #0ff;
    }

    table {
        width: 95%;
        margin: 20px auto;
        border-collapse: collapse;
        color: #aff;
    }

    th, td {
        border: 1px solid #0ff;
        padding: 8px;
        text-align: center;
        font-size: 14px;
    }

    th {
        background: rgba(0, 255, 255, 0.1);
        text-shadow: 0 0 8px #0ff;
    }

    .dashboard {
        margin-top: 20px;
        padding: 15px;
        border: 2px solid #0ff;
        border-radius: 10px;
        width: 90%;
        margin-left: auto;
        margin-right: auto;
        box-shadow: 0 0 15px #0ff;
    }

    .countdown {
        font-size: 20px;
        margin-top: 10px;
        text-shadow: 0 0 10px #0ff;
    }
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen">
    <div class="login-box">
        <h2>Acceso Admin</h2>
        <input type="password" id="clave" placeholder="Clave de acceso" />
        <button onclick="validarClave()">Entrar</button>
        <p id="error" style="color:#f55; margin-top:10px;"></p>
    </div>
</div>

<!-- PANEL -->
<div id="panel">
    <h1>🛠️ Panel Admin – Neon Cian</h1>

    <div class="dashboard">
        <h3>Dashboard en tiempo real</h3>
        <p id="stats"></p>
        <div class="countdown" id="countdown"></div>
    </div>

    <button onclick="cargarDatos()">🔄 Refrescar ahora</button>
    <button onclick="limpiarSorteo()">🧹 Limpiar sorteo</button>

    <table id="tabla">
        <thead>
            <tr>
                <th>N°</th>
                <th>Estado</th>
                <th>Nombre</th>
                <th>Teléfono</th>
                <th>ID</th>
                <th>Banco</th>
                <th>Monto</th>
                <th>Ref</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<script>
const CLAVE = "vaudy*$#";
const API = "https://script.google.com/macros/s/AKfycbwXyPtfuHndQh50JoGWA9toWYpaQ-XBnUIKqYnZNA7SO3XA1bkVH0qU_a58yncTvVKqmA/exec";

/* VALIDAR CLAVE */
function validarClave() {
    const clave = document.getElementById("clave").value;
    if (clave === CLAVE) {
        document.getElementById("loginScreen").style.display = "none";
        document.getElementById("panel").style.display = "block";
        cargarDatos();
        iniciarCuentaRegresiva();
    } else {
        document.getElementById("error").innerText = "Clave incorrecta";
    }
}

/* CARGAR DATOS */
async function cargarDatos() {
    try {
        const res = await fetch(API);
        const data = await res.json();

        const tbody = document.querySelector("#tabla tbody");
        tbody.innerHTML = "";

        let libres = 0, apartados = 0, pagados = 0;

        data.forEach(row => {
            const tr = document.createElement("tr");
            tr.innerHTML = `
                <td>${row.numero}</td>
                <td>${row.estado}</td>
                <td>${row.nombre}</td>
                <td>${row.telefono}</td>
                <td>${row.id}</td>
                <td>${row.banco}</td>
                <td>${row.monto}</td>
                <td>${row.referencia}</td>
            `;
            tbody.appendChild(tr);

            if (row.estado === "libre") libres++;
            if (row.estado === "apartado") apartados++;
            if (row.estado === "pagado") pagados++;
        });

        document.getElementById("stats").innerHTML =
            `Libres: ${libres} | Apartados: ${apartados} | Pagados: ${pagados}`;

    } catch (e) {
