<body>

<h1>🛠 Panel Admin - La Bianca23</h1>

<div id="countdown"></div>
<div id="resumen"></div>

<button class="btn" onclick="refrescar()">🔄 Refrescar ahora</button>
<button class="btn-danger" onclick="limpiarSorteo()">🧹 Limpiar sorteo</button>

<table id="tabla">
  <thead>
    <tr>
      <th>N°</th>
      <th>Estado</th>
      <th>Nombre</th>
      <th>Teléfono</th>
      <th>ID</th>
      <th>Banco</th>
      <th>Monto</th>
      <th>Ref</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<script>
const API = "https://script.google.com/macros/s/AKfycbx-GNuGtSs1NgPurnTR0MpcihWJpOo1HX1RwE6ZrpJRKhdkngVk_dyCnLaDE6wpYy6DJw/exec";
const PASS = "BIANCA23"; // misma clave que en Apps Script

/* DASHBOARD */
function cargarAdmin() {
  fetch(`${API}?admin=1&pass=${encodeURIComponent(PASS)}`)
    .then(r=>r.json())
    .then(d=>{
      if(d.status !== "ok") return alert("Acceso denegado");

      const tb = document.querySelector("#tabla tbody");
      tb.innerHTML = "";

      let libres=0, ap=0, pg=0;

      d.lista.forEach(r=>{
        if(r.numero === "" || r.numero === null) return;

        const est = String(r.estado||"libre").toLowerCase();
        if(est==="libre") libres++;
        else if(est==="apartado") ap++;
        else if(est==="pagado") pg++;

        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${r.numero}</td>
          <td class="estado-${est.slice(0,2)}">${est}</td>
          <td>${r.nombre||""}</td>
          <td>${r.telefono||""}</td>
          <td>${r.id||""}</td>
          <td>${r.banco||""}</td>
          <td>${r.monto||""}</td>
          <td>${r.referencia||""}</td>
        `;
        tb.appendChild(tr);
      });

      document.getElementById("resumen").innerText =
        `Libres: ${libres} | Apartados: ${ap} | Pagados: ${pg}`;
    });
}

function refrescar() { cargarAdmin(); }

/* CONTADOR REGRESIVO */
const target = new Date("2026-03-29T19:00:00-04:00").getTime();
setInterval(()=>{
  const now = Date.now();
  const diff = target - now;
  const el = document.getElementById("countdown");

  if(diff <= 0){
    el.innerText = "🎉 ¡SORTEO EN PROCESO!";
    return;
  }

  const h = Math.floor(diff/(1000*60*60));
  const m = Math.floor((diff%(1000*60*60))/(1000*60));
  const s = Math.floor((diff%(1000*60))/1000);

  el.innerText = `⏳ ${h}h ${m}m ${s}s para el sorteo`;
},1000);
